# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    name: Build y Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instala pnpm (toma la versión de packageManager en package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 3. Configura Node.js con cache de pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. Instala dependencias usando pnpm
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # 5. Build de producción (genera la carpeta /dist)
      - name: Build
        run: pnpm run build

      # 6. Configura GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 7. Sube la carpeta dist como artefacto
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 8. Deploy a GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
